name: ecommerce-ms

services:
  auth-service:
    build:
      context: ./auth-service
    ports:
      - "8000:8000"
    depends_on:
      auth-db:
        condition: service_healthy

  auth-db:
    image: postgres:alpine
    env_file:
      - ./auth-service/db.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  auth-db-data:

networks:
  backend:
